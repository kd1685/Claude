<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kingdom 1685 — KvK DKP</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<main>
  <h1>KvK DKP Rankings</h1>
  <p class="sub">Points from T4/T5 kills and dead troops <b>gained</b> over an event window. Pick a saved event or a custom date range.</p>

  <div class="toolbar">
    <div class="field">
      <label>Event</label>
      <select id="event"><option value="">— custom range —</option></select>
    </div>
    <div class="field"><label>From</label><input type="date" id="from" /></div>
    <div class="field"><label>To</label><input type="date" id="to" /></div>
    <div class="field"><label>T4 ×</label><input type="number" id="w4" value="1" step="0.5" style="width:80px" /></div>
    <div class="field"><label>T5 ×</label><input type="number" id="w5" value="2" step="0.5" style="width:80px" /></div>
    <div class="field"><label>Dead ×</label><input type="number" id="wd" value="5" step="0.5" style="width:80px" /></div>
    <button class="primary" id="go">Calculate</button>
  </div>

  <div class="panel">
    <h2>DKP leaderboard <span class="muted" id="window" style="font-size:12px"></span></h2>
    <table>
      <thead><tr><th class="pos">#</th><th>Governor</th><th>Alliance</th>
        <th class="num">DKP</th><th class="num">T4 gain</th><th class="num">T5 gain</th><th class="num">Deads gain</th></tr></thead>
      <tbody id="board"></tbody>
    </table>
  </div>
</main>

<script src="js/common.js"></script>
<script>
async function load() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const w4 = +document.getElementById("w4").value;
  const w5 = +document.getElementById("w5").value;
  const wd = +document.getElementById("wd").value;
  const d = await api(`/api/stats/dkp?from=${from}&to=${to}&w_t4=${w4}&w_t5=${w5}&w_dead=${wd}`);
  document.getElementById("window").textContent = `· ${d.from} → ${d.to}`;
  document.getElementById("board").innerHTML = d.rows.map(r => `
    <tr><td class="pos">${r.position}</td>
        <td><a href="players.html?id=${r.player_id}">${r.name}</a></td>
        <td><span class="tag">${r.alliance || "—"}</span></td>
        <td class="num"><b>${fmt(r.dkp)}</b></td>
        <td class="num muted">${fmt(r.t4_gain)}</td>
        <td class="num muted">${fmt(r.t5_gain)}</td>
        <td class="num muted">${fmt(r.dead_gain)}</td></tr>`).join("")
    || `<tr><td colspan="7" class="muted">No DKP in this window (needs kills/deads scans at both dates).</td></tr>`;
}

(async () => {
  await buildHeader("dkp.html");
  const events = await api("/api/events").catch(() => []);
  const sel = document.getElementById("event");
  sel.innerHTML = `<option value="">— custom range —</option>` +
    events.map(e => `<option value="${e.start_date}|${e.end_date}">${e.name} (${e.start_date}→${e.end_date})</option>`).join("");
  document.getElementById("to").value = todayISO();
  document.getElementById("from").value = daysAgoISO(14);
  sel.onchange = () => {
    if (!sel.value) return;
    const [s, e] = sel.value.split("|");
    document.getElementById("from").value = s;
    document.getElementById("to").value = e;
    load();
  };
  document.getElementById("go").onclick = load;
  await load();
})();
</script>
</body>
</html>
