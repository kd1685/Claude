<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kingdom 1685 — Power & KP</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<main>
  <h1>Power &amp; Kill Points</h1>
  <p class="sub">Leaderboard as of a chosen date, with optional gains since a start date.</p>

  <div class="toolbar">
    <div class="field">
      <label>Metric</label>
      <select id="metric">
        <option value="kill_points">Kill Points (KP)</option>
        <option value="power">Power</option>
        <option value="t5_kills">T5 kills</option>
        <option value="t4_kills">T4 kills</option>
      </select>
    </div>
    <div class="field">
      <label>As of date</label>
      <select id="date"></select>
    </div>
    <div class="field">
      <label>Compare from (gains)</label>
      <select id="from"><option value="">— none —</option></select>
    </div>
    <button class="primary" id="go">Apply</button>
  </div>

  <div class="panel">
    <h2 id="chartTitle">Kingdom total over time</h2>
    <div style="height:260px"><canvas id="chart"></canvas></div>
  </div>

  <div class="panel">
    <h2>Leaderboard</h2>
    <table>
      <thead><tr><th class="pos">#</th><th>Governor</th><th>Alliance</th>
        <th class="num">Value</th><th class="num" id="gainHead">Gain</th></tr></thead>
      <tbody id="board"></tbody>
    </table>
  </div>
</main>

<script src="js/common.js"></script>
<script>
async function load() {
  const metric = document.getElementById("metric").value;
  const date = document.getElementById("date").value;
  const from = document.getElementById("from").value;
  const q = `metric=${metric}&date=${date}` + (from ? `&from=${from}` : "");

  const board = await api(`/api/stats/leaderboard?${q}&limit=200`);
  const chFrom = from || daysAgoISO(30);
  const totals = await api(`/api/stats/kingdom-totals?metric=${metric}&from=${chFrom}&to=${date}`);

  document.getElementById("gainHead").style.display = from ? "" : "none";
  document.getElementById("board").innerHTML = board.rows.map(r => `
    <tr><td class="pos">${r.position}</td>
        <td><a href="players.html?id=${r.player_id}">${r.name}</a></td>
        <td><span class="tag">${r.alliance || "—"}</span></td>
        <td class="num">${fmt(r.value)}</td>
        ${from ? gainCell(r.gain) : ""}</tr>`).join("")
    || `<tr><td colspan="5" class="muted">No data for this metric/date.</td></tr>`;

  document.getElementById("chartTitle").textContent =
    `Kingdom total ${metric.replace("_"," ")} over time`;
  lineChart("chart", totals.series.map(s => s.captured_at),
    [{ label: "total", data: totals.series.map(s => s.total), borderColor: "#5aa6ff", backgroundColor: "rgba(90,166,255,.12)", fill: true }]);
}

(async () => {
  await buildHeader("kp.html");
  const dates = await fillDateOptions(document.getElementById("date"));
  const fromSel = document.getElementById("from");
  fromSel.innerHTML = `<option value="">— none —</option>` + dates.map(d => `<option value="${d}">${d}</option>`).join("");
  document.getElementById("go").onclick = load;
  ["metric","date","from"].forEach(id => document.getElementById(id).onchange = load);
  await load();
})();
</script>
</body>
</html>
