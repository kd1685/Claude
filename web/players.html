<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kingdom 1685 — Governors</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/vendor/chart.umd.min.js"></script>
</head>
<body>
<main>
  <h1>Governors</h1>
  <p class="sub">Search the roster and open a governor to see their full history.</p>

  <div class="toolbar">
    <div class="field grow">
      <label>Search name or alliance</label>
      <input id="search" placeholder="type to filter…" />
    </div>
  </div>

  <div class="row">
    <div class="panel grow">
      <h2>Roster</h2>
      <table>
        <thead><tr><th>Governor</th><th>Alliance</th><th>Rank</th>
          <th class="num">Power</th><th class="num">KP</th><th class="num">Deads</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="panel grow" id="detail" style="display:none">
      <h2 id="dName"></h2>
      <p class="sub" id="dMeta"></p>
      <div style="height:220px"><canvas id="dChart"></canvas></div>
      <p class="hint" id="dPos"></p>
    </div>
  </div>
</main>

<script src="js/common.js"></script>
<script>
let timer;
async function loadList() {
  const s = document.getElementById("search").value.trim();
  const rows = await api(`/api/players${s ? `?search=${encodeURIComponent(s)}` : ""}`);
  document.getElementById("rows").innerHTML = rows.map(r => `
    <tr style="cursor:pointer" onclick="openPlayer(${r.id})">
      <td>${r.name}</td><td><span class="tag">${r.alliance || "—"}</span></td>
      <td class="rank">R${r.rank}</td>
      <td class="num">${fmt(r.power)}</td>
      <td class="num">${fmt(r.kill_points)}</td>
      <td class="num">${fmt(r.deads)}</td></tr>`).join("")
    || `<tr><td colspan="6" class="muted">No governors found.</td></tr>`;
}

async function openPlayer(id) {
  const d = await api(`/api/players/${id}`);
  const p = d.player;
  document.getElementById("detail").style.display = "";
  document.getElementById("dName").textContent = p.name;
  document.getElementById("dMeta").textContent =
    `${p.alliance || "no alliance"} · R${p.rank} · governor id ${p.governor_id || "—"}`;
  const h = d.history;
  lineChart("dChart", h.map(x => x.captured_at), [
    { label: "Power", data: h.map(x => x.power), borderColor: "#e7b94e", yAxisID: "y" },
    { label: "KP", data: h.map(x => x.kill_points), borderColor: "#5aa6ff", yAxisID: "y" },
    { label: "Deads", data: h.map(x => x.deads), borderColor: "#f06a6a", yAxisID: "y" },
  ]);
  const last = d.positions[0];
  document.getElementById("dPos").textContent = last
    ? `Last located: K${last.kingdom} (${last.x},${last.y}) on ${last.captured_at}`
    : "No map location recorded yet — use the Control page to locate.";
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

(async () => {
  await buildHeader("players.html");
  document.getElementById("search").oninput = () => { clearTimeout(timer); timer = setTimeout(loadList, 250); };
  await loadList();
  const id = new URLSearchParams(location.search).get("id");
  if (id) openPlayer(+id);
})();
</script>
</body>
</html>
