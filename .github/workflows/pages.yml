name: Deploy website to GitHub Pages

# Publishes the static website in web/ to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
# After that, every push that changes web/ (re)deploys the site at
#   https://<owner>.github.io/<repo>/
on:
  push:
    branches: ["main", "claude/charming-euler-XVzpN"]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web            # publish only the website folder
      - id: deployment
        uses: actions/deploy-pages@v4
