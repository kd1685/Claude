version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://ascent:${DB_PASSWORD}@db:5432/ascent_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - keys_data:/app/keys.json

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ascent
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ascent_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ascent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  caddy_data:
  caddy_config:
  keys_data:
