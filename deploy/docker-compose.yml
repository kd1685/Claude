# Full VPS stack: a headless Android (redroid) running Rise of Kingdoms, plus
# the tracker/controller pointed at it over ADB.
#
# Requirements on the VPS host:
#   * Linux with KVM is NOT required for redroid, but the host kernel needs
#     the binder/ashmem modules (most modern kernels have them; see redroid docs).
#   * Install RoK inside the redroid instance once (adb install, or a store),
#     log into the controlling account, then calibrate the UI profile.
#
# Bring up:   docker compose -f deploy/docker-compose.yml up -d
# Calibrate:  docker compose exec app python -m scripts.calibrate screenshot

services:
  android:
    image: redroid/redroid:13.0.0-latest
    container_name: rok-android
    privileged: true
    ports:
      - "5555:5555"            # ADB
    command:
      - androidboot.redroid_width=1280
      - androidboot.redroid_height=720
      - androidboot.redroid_dpi=240
    volumes:
      - android-data:/data
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: rok-app
    depends_on: [android]
    expose:
      - "8000"                      # internal only; reached via the caddy proxy
    environment:
      CONTROL_BACKEND: adb
      ADB_CONNECT: android:5555
      ADB_SERIAL: android:5555
      KINGDOM_ID: "1685"
      UI_PROFILE: app/profiles/rok_720p.json
      DB_PATH: /data/rok1685.db
      # Officers-only Control page. CHANGE THIS — set it in deploy/.env.
      CONTROL_PASSWORD: ${CONTROL_PASSWORD:-changeme1685}
      CONTROL_SECRET: ${CONTROL_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - app-data:/data
    restart: unless-stopped

  # Public entry point. Set SITE_ADDRESS to a domain in deploy/.env for HTTPS.
  caddy:
    image: caddy:2
    container_name: rok-caddy
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  android-data:
  app-data:
  caddy-data:
  caddy-config:
